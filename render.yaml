# Render Blueprint for the Sanctum backend (Express 5 + Turso).
# Deploy: Render Dashboard → New → Blueprint → connect this repo,
# OR via the Render API/CLI. Secret values are marked sync:false and
# must be set in the Render dashboard / API (never committed here).
services:
  - type: web
    name: sanctum-backend
    runtime: node
    region: singapore
    plan: free
    branch: main
    autoDeploy: true
    # npm install (not pnpm): pnpm 11 blocks argon2's native build script
    # (ERR_PNPM_IGNORED_BUILDS) on Render. --include=dev is required because
    # NODE_ENV=production would otherwise skip TypeScript/drizzle devDeps.
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TABLE_PREFIX
        value: sanctum_
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: EMAIL_FROM_NAME
        value: Sanctum
      - key: SMTP_HOST
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: "465"
      # ---- secrets / per-environment (set in dashboard or via API) ----
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: VAULT_ENC_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
